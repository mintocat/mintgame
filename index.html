<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歴史年号ピッタリゲーム</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // 別ファイルから問題を読み込み
        import { allQuestions } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVdU-MrM30FfcQdonZwttDZoa1gHkgEUQ",
            authDomain: "mintgame-94280.firebaseapp.com",
            databaseURL: "https://mintgame-94280-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mintgame-94280",
            storageBucket: "mintgame-94280.firebasestorage.app",
            messagingSenderId: "747623486963",
            appId: "1:747623486963:web:1a5bfc0937717f5b422e86"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let roomId = "";
        let playerId = Math.random().toString(36).substring(7);
        let myName = "";
        let currentScreen = "setup";

        const showScreen = (id) => {
            currentScreen = id;
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        window.createRoom = () => {
            roomId = Math.random().toString(36).substring(2, 4).toUpperCase();
            myName = document.getElementById("uName").value || "名無し";
            const A = parseInt(document.getElementById("setA").value) || 5;
            const B = parseInt(document.getElementById("setB").value) || 5000;
            set(ref(db, 'rooms/' + roomId), {
                settings: { A, B, status: "waiting", host: playerId },
                players: { [playerId]: { name: myName, isReady: false, selected: [], playAgain: false } }
            });
            listenRoom();
        };

        window.joinRoom = () => {
            roomId = document.getElementById("rId").value.toUpperCase();
            myName = document.getElementById("uName").value || "名無し";
            if(!roomId) return alert("ルームIDを入力してね");
            update(ref(db, `rooms/${roomId}/players/${playerId}`), {
                name: myName, isReady: false, selected: [], playAgain: false
            });
            listenRoom();
        };

        function listenRoom() {
            onValue(ref(db, 'rooms/' + roomId), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                if (data.settings.status === "waiting") {
                    showScreen("lobby");
                    document.getElementById("displayRoomId").innerText = roomId;
                    const pList = Object.values(data.players).map(p => `<li>${p.name}</li>`).join("");
                    document.getElementById("playerList").innerHTML = pList;
                    document.getElementById("startBtn").style.display = data.settings.host === playerId ? "block" : "none";
                } 
                else if (data.settings.status === "playing") {
                    renderGame(data);
                }
                else if (data.settings.status === "finished") {
                    if(currentScreen !== "result" && currentScreen !== "animation") startDrama(data);
                }
                const players = Object.values(data.players);
                if (players.length > 0 && players.every(p => p.playAgain) && data.settings.host === playerId) {
                    resetGame(data.settings);
                }
            });
        }

        async function resetGame(settings) {
            const selectedQs = selectQuestions(allQuestions, settings.A);
            const updates = { "settings/status": "playing", "currentQuestions": selectedQs };
            onValue(ref(db, `rooms/${roomId}/players`), (snap) => {
                const pData = snap.val();
                for(let id in pData) {
                    updates[`players/${id}/isReady`] = false;
                    updates[`players/${id}/selected`] = [];
                    updates[`players/${id}/playAgain`] = false;
                }
            }, { onlyOnce: true });
            update(ref(db, `rooms/${roomId}`), updates);
        }

        window.startGame = () => {
            onValue(ref(db, `rooms/${roomId}/settings`), (snapshot) => {
                const settings = snapshot.val();
                const selectedQs = selectQuestions(allQuestions, settings.A);
                update(ref(db, `rooms/${roomId}/settings`), { status: "playing" });
                set(ref(db, `rooms/${roomId}/currentQuestions`), selectedQs);
            }, { onlyOnce: true });
        };

        function selectQuestions(list, count) {
            let filtered = [];
            let setUsed = new Set();
            let shuffled = [...list].sort(() => 0.5 - Math.random());
            for (let q of shuffled) {
                // setが存在しない（省略された）場合はnullとして扱う修正
                const qSet = q.set !== undefined ? q.set : null;
                if (qSet && setUsed.has(qSet)) continue;
                if (qSet) setUsed.add(qSet);
                filtered.push(q);
                if (filtered.length >= count) break;
            }
            return filtered;
        }

        function renderGame(data) {
            showScreen("game");
            document.getElementById("targetB").innerText = data.settings.B;
            const qDiv = document.getElementById("qList");
            qDiv.innerHTML = "";
            const myData = data.players[playerId];
            const mySelected = myData.selected || [];
            
            data.currentQuestions.forEach((q, idx) => {
                const btn = document.createElement("button");
                btn.innerText = q.event;
                btn.className = mySelected.includes(idx) ? "selected" : "";
                btn.onclick = () => { if(!myData.isReady) toggleSelect(idx, mySelected); };
                qDiv.appendChild(btn);
            });

            const readyBtn = document.getElementById("readyBtn");
            if (myData.isReady) {
                readyBtn.innerText = "解除";
                readyBtn.style.background = "#8bc34a";
            } else {
                readyBtn.innerText = "決定";
                readyBtn.style.background = "#ff9800";
            }
            
            const players = Object.values(data.players);
            if (players.every(p => p.isReady) && data.settings.host === playerId) {
                update(ref(db, `rooms/${roomId}/settings`), { status: "finished" });
            }
        }

        function toggleSelect(idx, current) {
            let newSelect = current.includes(idx) ? current.filter(i => i !== idx) : [...current, idx];
            update(ref(db, `rooms/${roomId}/players/${playerId}`), { selected: newSelect });
        }

        window.toggleReady = () => {
            onValue(ref(db, `rooms/${roomId}/players/${playerId}/isReady`), (snap) => {
                update(ref(db, `rooms/${roomId}/players/${playerId}`), { isReady: !snap.val() });
            }, { onlyOnce: true });
        };

        async function startDrama(data) {
            showScreen("animation");
            const ani = document.getElementById("animationContent");
            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            ani.innerHTML = "<h1>結果発表！！</h1>";
            await delay(1500);

            let qListHtml = "<h3>【正解発表】</h3><ul style='list-style:none; padding:0;'>";
            data.currentQuestions.forEach(q => {
                qListHtml += `<li>${q.event} : <strong>${q.year}年</strong></li>`;
            });
            qListHtml += "</ul>";
            ani.innerHTML = qListHtml;
            await delay(3000);

            const mySum = (data.players[playerId].selected || []).reduce((s, i) => s + data.currentQuestions[i].year, 0);
            ani.innerHTML += `<h2>あなたの合計: ${mySum}</h2>`;
            await delay(2000);

            ani.innerHTML += "<h1>優勝は...</h1>";
            await delay(2000);

            let bestDiff = Infinity;
            let winners = [];
            Object.values(data.players).forEach(p => {
                const sum = (p.selected || []).reduce((s, i) => s + data.currentQuestions[i].year, 0);
                const diff = Math.abs(data.settings.B - sum);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    winners = [p.name];
                } else if (diff === bestDiff) {
                    winners.push(p.name);
                }
            });
            const winnersText = winners.join(" ＆ ");
            ani.innerHTML += `<h1 style='color:red; font-size:3em;'>✨ ${winnersText} ✨</h1>`;
            await delay(3000);
            renderFinalResult(data, winners);
        }

        function renderFinalResult(data, winners) {
            showScreen("result");
            const playAgainBtn = document.getElementById("playAgainBtn");
            playAgainBtn.innerText = "もう一度遊ぶ";
            playAgainBtn.disabled = false;

            const B = data.settings.B;
            const qs = data.currentQuestions;
            
            let bestCombo = [], minDiff = Infinity;
            for(let i=0; i < (1 << qs.length); i++) {
                let tempCombo = [], tempSum = 0;
                for(let j=0; j < qs.length; j++) {
                    if((i >> j) & 1) { tempCombo.push(qs[j]); tempSum += qs[j].year; }
                }
                if(Math.abs(B - tempSum) < minDiff) { minDiff = Math.abs(B - tempSum); bestCombo = tempCombo; }
            }
            const optimalSum = bestCombo.reduce((s, q) => s + q.year, 0);

            let resultsHTML = "<h3>プレイヤーの選択</h3>";
            Object.values(data.players).forEach(p => {
                const pSelected = p.selected || [];
                const sum = pSelected.reduce((s, i) => s + qs[i].year, 0);
                const isWinner = winners.includes(p.name);
                const isOptimal = (sum === optimalSum);

                resultsHTML += `<div style='border:1px solid #ddd; margin-bottom:10px; padding:10px; border-radius:8px; background:${isWinner ? '#fff0f0' : 'white'}'>`;
                resultsHTML += `<strong style='font-size:1.2em; color:${isWinner ? 'red' : 'black'}'>${p.name} ${isWinner ? '(優勝！)' : ''}</strong><br>`;
                resultsHTML += `<small>${pSelected.length > 0 ? pSelected.map(i => `${qs[i].event}(${qs[i].year})`).join(' + ') : '選択なし'}</small><br>`;
                resultsHTML += `合計: <strong>${sum}</strong> (差: ${Math.abs(B - sum)})`;
                if(isOptimal) resultsHTML += ` <span style='color:blue; font-weight:bold;'>★最適解です！</span>`;
                resultsHTML += `</div>`;
            });
            
            let optimalText = bestCombo.map(q => `${q.event}(${q.year})`).join('<br>+ ');
            resultsHTML += `<div style='background:#e3f2fd; padding:15px; border-radius:8px; margin-top:20px;'>`;
            resultsHTML += `<strong>最適解の例:</strong><br>${optimalText}<br>= 合計 <strong>${optimalSum}</strong> (目標との差: ${minDiff})</div>`;

            document.getElementById("resContent").innerHTML = resultsHTML;
        }

        window.votePlayAgain = () => {
            update(ref(db, `rooms/${roomId}/players/${playerId}`), { playAgain: true });
            document.getElementById("playAgainBtn").innerText = "他の人を待っています...";
            document.getElementById("playAgainBtn").disabled = true;
        };

    </script>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; text-align: center; background: #fdfdfd; color: #333; margin: 0; padding: 10px; }
        button { margin: 10px; padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background: white; transition: 0.2s; }
        button.selected { background: #fff176; border-color: #fbc02d; font-weight: bold; transform: scale(1.02); }
        input { padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
        .screen { display: none; padding: 10px; max-width: 500px; margin: 0 auto; }
        #setup { display: block; }
        #qList button { display: block; width: 100%; margin: 8px 0; text-align: left; padding: 15px; }
        .ani-box { min-height: 400px; display: flex; flex-direction: column; justify-content: center; }
        h1 { color: #2c3e50; }
        ul { text-align: left; display: inline-block; }
    </style>
</head>
<body>
    <div id="setup" class="screen">
        <h1>歴史ピッタリゲーム</h1>
        名前: <input type="text" id="uName" style="width:80%"><br><br>
        問題数A: <input type="number" id="setA" value="5"><br>
        目標値B: <input type="number" id="setB" value="5000"><br><br>
        <button onclick="createRoom()" style="background:#4caf50; color:white; width:90%;">ルームを作る</button>
        <hr>
        2桁ルームID: <input type="text" id="rId" maxlength="2" style="width:60px; text-transform:uppercase;"><br>
        <button onclick="joinRoom()" style="width:90%;">参加する</button>
    </div>

    <div id="lobby" class="screen">
        <h2>待機中... ID: <span id="displayRoomId" style="color:red; font-size:1.5em;"></span></h2>
        <ul id="playerList" style="font-size:20px; min-height:100px;"></ul>
        <button id="startBtn" onclick="startGame()" style="background:#2196f3; color:white; width:90%;">全員揃ったのでスタート！</button>
    </div>

    <div id="game" class="screen">
        <h2 style="font-size:1.2em;">合計が <span id="targetB" style="color:red; font-size:1.5em;"></span> に<br>近くなるように選べ！</h2>
        <div id="qList"></div>
        <button id="readyBtn" onclick="toggleReady()" style="color:white; width:90%; font-weight:bold; height:60px; font-size:24px;">決定</button>
    </div>

    <div id="animation" class="screen">
        <div id="animationContent" class="ani-box"></div>
    </div>

    <div id="result" class="screen">
        <h2>最終結果</h2>
        <div id="resContent" style="text-align:left;"></div>
        <button id="playAgainBtn" onclick="votePlayAgain()" style="background:#4caf50; color:white; width:90%; margin-top:20px;">もう一度遊ぶ</button>
    </div>
</body>
</html>
